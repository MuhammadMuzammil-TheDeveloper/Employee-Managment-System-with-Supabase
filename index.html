<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Admin Panel</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css">
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="#"> Employee Management </a>
      </div>
    </nav>

    <div class="container py-5 page-container">
      <!-- Add Employee -->
      <div class="card mb-4">
        <div class="card-header">Add Employee</div>

        <div class="card-body">
          <form id="employeeForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Employee Name</label>
                <input type="text" id="employeeName" class="form-control" />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="employeeEmail" class="form-control" />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Department</label>
                <input type="text" id="employeeDepart" class="form-control" />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Salary</label>
                <input type="number" id="employeeSalary" class="form-control" />
              </div>
            </div>

            <button class="btn btn-primary" id="addEmployee" onclick="addEmploee(event)">Add Employee</button>
          </form>
        </div>
      </div>

      <!-- Employee List -->

      <div class="card">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <span>Employee List</span>

          <button class="btn btn-danger btn-sm">Delete All</button>
        </div>

        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Department</th>
                  <th>Salary</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody>
                <tr>
                  <td>1</td>
                  <td>Muhammad Muzammil</td>
                  <td>muzammil@gmail.com</td>
                  <td>IT</td>
                  <td>50000</td>

                  <td>
                    <button class="btn btn-warning btn-sm">Update</button>

                    <button class="btn btn-danger btn-sm">Delete</button>
                  </td>
                </tr>

                <tr>
                  <td>2</td>
                  <td>Ali Khan</td>
                  <td>ali@gmail.com</td>
                  <td>HR</td>
                  <td>45000</td>

                  <td>
                    <button class="btn btn-warning btn-sm">Update</button>

                    <button class="btn btn-danger btn-sm">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </body>
  <script src="./script/app.js"></script>
</html>
